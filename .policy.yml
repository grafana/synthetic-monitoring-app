policy:
  approval:
    - or:
        - and:
            - Workflow .github/workflows/dangerJS.yml succeeded or skipped
            - Workflow .github/workflows/validate-grafana-compat.yml succeeded or skipped
            - Workflow .github/workflows/validate-i18n.yml succeeded or skipped
            - Workflow .github/workflows/validate-policy-bot.yml succeeded or skipped
            - Workflow .github/workflows/validate-probe-api-server-mappings.yml succeeded or skipped
            - Workflow .github/workflows/validate-terraform.yml succeeded or skipped
            - Workflow .github/workflows/validate_pr.yml succeeded or skipped
            - default to approval
        - override policies
    - policy bot config is valid when modified
approval_rules:
  - name: Workflow .github/workflows/dangerJS.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/dangerJS\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/dangerJS.yml
  - name: Workflow .github/workflows/validate-grafana-compat.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-grafana-compat\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-grafana-compat.yml
  - name: Workflow .github/workflows/validate-i18n.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-i18n\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-i18n.yml
  - name: Workflow .github/workflows/validate-policy-bot.yml succeeded or skipped
    if:
      changed_files:
        paths:
          - ^\.policy\.yml$
          - ^\.github\/workflows\/validate-policy-bot\.yml$
          - ^scripts\/gen-policy-bot-config$
          - ^scripts\/check-policy-bot-config$
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-policy-bot\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-policy-bot.yml
  - name: Workflow .github/workflows/validate-probe-api-server-mappings.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-probe-api-server-mappings\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-probe-api-server-mappings.yml
  - name: Workflow .github/workflows/validate-terraform.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-terraform\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-terraform.yml
  - name: Workflow .github/workflows/validate_pr.yml succeeded or skipped
    if:
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate_pr\.yml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate_pr.yml
  - name: default to approval
  - name: policy bot config is valid when modified
    if:
      changed_files:
        paths:
          - ^\.policy\.yml
    requires:
      conditions:
        has_successful_status:
          - Validate policy bot config
  - name: override policies
    description: |
      Policy-bot can be overridden in emergency situations.
      **Only use this when absolutely neccesary, as it allows PRs with unfinished/unvalidated CI jobs to be merged.**
      Note that a reason is required, IE: `policy-bot disable: We need to deploy this fix to resolve [this ongoing incident with policy-bot](...).`
    options:
      methods:
        comment_patterns:
          - (?s)policy[- ]bot:? (?:approve|disable)d?(?::?(?<reason>.*))
        github_review: false
    requires:
      count: 1
      permissions:
        - write
