# Manual deployment workflow for Synthetic Monitoring App
# Uses shared workflows from plugin-ci-workflows for provisioned plugins
# Documentation: https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions

name: Manual Deployment
run-name: Deploy ${{ inputs.branch }} to ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to publish from (can be used to deploy PRs to dev)
        default: main
      environment:
        description: Environment to publish to
        required: true
        type: choice
        options:
          - 'dev'
          - 'ops'
          - 'prod'

permissions: {}

jobs:
  cd:
    name: CD
    uses: grafana/plugin-ci-workflows/.github/workflows/cd.yml@ci-cd-workflows/v8.0.1
    permissions:
      contents: write # write is only needed if we publish docs to the website, which we don't, but the workflow won't work without this.
      id-token: write
      attestations: write
      pull-requests: read
    with:
      branch: ${{ github.event.inputs.branch }}

      environment: ${{ github.event.inputs.environment }}

      docs-only: false

      scopes: universal

      # Argo CD inputs
      grafana-cloud-deployment-type: provisioned
      trigger-argo: ${{ github.event.inputs.branch == 'main' }}
      argo-workflow-slack-channel: '#sm-ops-deploys'

      auto-merge-environments: dev, ops

      # https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions/#customizing-the-workflows-with-inputs
      node-version: 22
      run-playwright: false  # Disabled - no Playwright tests configured
