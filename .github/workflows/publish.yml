# Manual deployment workflow for Synthetic Monitoring App
# Uses shared workflows from plugin-ci-workflows for provisioned plugins
# Documentation: https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions

name: Manual Deployment
run-name: Deploy ${{ inputs.branch }} to ${{ inputs.environment }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to publish from (can be used to deploy PRs to dev)
        default: main
      environment:
        description: Environment to publish to
        required: true
        type: choice
        options:
          - 'dev'
          - 'ops'
          - 'prod'

permissions: {}

jobs:
  cd:
    name: CD
    uses: grafana/plugin-ci-workflows/.github/workflows/cd.yml@ci-cd-workflows/v8.0.1
    #  About permissions below.
    #
    # - attestations: write: publish attestations.
    # - contents: write: checkout code (read); create a git tag (write, not
    #   used); create a GitHub Release (write, not used); publish techdocs to
    #   webiste (not used). Change to contents: read as soon as possible.
    # - id-token: write: used to mint various tokens.
    # - pull-requests: read: list PRs to determine if the branch from which the
    #   release is created is an open PR. We don't need this because we set
    #   branch=main. Remove this as soon as possible.
    permissions:
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    with:
      branch: ${{ github.event.inputs.branch }}

      environment: ${{ github.event.inputs.environment }}

      docs-only: false

      scopes: universal

      # Argo CD inputs
      grafana-cloud-deployment-type: provisioned
      trigger-argo: ${{ github.event.inputs.branch == 'main' }}
      argo-workflow-slack-channel: '#sm-ops-deploys'

      auto-merge-environments: dev,ops,prod-canary,prod

      # Auto-approve every stage in Argo so the deployment progresses from
      # canary through to prod without a manual "Resume" click.
      # "0" = approve immediately; swap for a duration (e.g. "2h") to keep a soak.
      auto-approve-durations: |-
        {"dev": 0, "ops": 0, "prod-canary": 0, "prod": 0}

      # https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions/#customizing-the-workflows-with-inputs
      node-version: 22
      run-playwright: false  # Disabled - no Playwright tests configured
