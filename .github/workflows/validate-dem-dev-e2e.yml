name: Validate dem-dev E2E

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dem-dev-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build plugin under test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out synthetic-monitoring-app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install app dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Validate E2E types
        run: yarn typecheck:e2e

      - name: Build plugin
        run: yarn build

      - name: Upload plugin build
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sm-plugin-dist
          path: dist
          retention-days: 1

  e2e:
    name: Read and write journeys
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out synthetic-monitoring-app
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # This source-level lock is the temporary form of the future single
      # dem-dev runtime version. It deliberately avoids moving branches.
      - name: Read dem-dev runtime lock
        id: runtime
        shell: bash
        run: |
          set -a
          source e2e/dem-dev/runtime.env
          set +a
          {
            echo "dem_dev_ref=${DEM_DEV_REF}"
            echo "sm_api_ref=${SM_API_REF}"
            echo "sm_agent_ref=${SM_AGENT_REF}"
          } >> "${GITHUB_OUTPUT}"

      - name: Get cross-repository token
        id: github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@580590a644e82e79bb2598bdaba0be245a14dda0 # create-github-app-token/v0.2.2
        with:
          github_app: synthetic-monitoring-ci
          permission_set: dem-dev-e2e-read

      - name: Configure private Go module access
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          APP_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          echo "machine github.com login ${GITHUB_ACTOR} password ${APP_TOKEN}" >> "${HOME}/.netrc"
          chmod 600 "${HOME}/.netrc"

      - name: Check out dem-dev
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: grafana/dem-dev
          ref: ${{ steps.runtime.outputs.dem_dev_ref }}
          path: work/dem-dev
          token: ${{ steps.github-app-token.outputs.token }}
          persist-credentials: false

      - name: Check out synthetic-monitoring-api
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: grafana/synthetic-monitoring-api
          ref: ${{ steps.runtime.outputs.sm_api_ref }}
          path: work/synthetic-monitoring-api
          token: ${{ steps.github-app-token.outputs.token }}
          persist-credentials: false

      - name: Check out synthetic-monitoring-agent
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: grafana/synthetic-monitoring-agent
          ref: ${{ steps.runtime.outputs.sm_agent_ref }}
          path: work/synthetic-monitoring-agent

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: work/synthetic-monitoring-api/go.mod
          cache-dependency-path: |
            work/synthetic-monitoring-api/go.sum
            work/synthetic-monitoring-agent/go.sum
            work/dem-dev/dev/scenarios/sm/history/go.sum

      - name: Install Tilt
        shell: bash
        run: |
          archive="${RUNNER_TEMP}/tilt.tar.gz"
          curl -fsSL \
            https://github.com/tilt-dev/tilt/releases/download/v0.36.3/tilt.0.36.3.linux.x86_64.tar.gz \
            -o "${archive}"
          echo "23a71a6625fe1a801bf5f5a49d985aaf6da79606dcd5e6eaee5defbef90c8fef  ${archive}" | sha256sum --check
          tar -xzf "${archive}" -C "${RUNNER_TEMP}"
          sudo install "${RUNNER_TEMP}/tilt" /usr/local/bin/tilt

      - name: Install app dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium

      - name: Download plugin build
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: sm-plugin-dist
          path: dist

      - name: Configure disposable dem-dev runtime
        env:
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
          SM_API_REPO: ${{ github.workspace }}/work/synthetic-monitoring-api
          SM_AGENT_REPO: ${{ github.workspace }}/work/synthetic-monitoring-agent
        run: yarn e2e:dem:configure

      - name: Start dem-dev runtime
        env:
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
        run: yarn e2e:dem:up

      - name: Seed deterministic scenario
        env:
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
        run: yarn e2e:dem:seed

      - name: Run read journeys
        env:
          CI: true
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
          PLAYWRIGHT_BLOB_OUTPUT_FILE: artifacts/blob-report/read.zip
          PLAYWRIGHT_OUTPUT_DIR: e2e-results/read
        run: yarn e2e:dem:test --project=read

      - name: Run write journeys
        env:
          CI: true
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
          PLAYWRIGHT_BLOB_OUTPUT_FILE: artifacts/blob-report/write.zip
          PLAYWRIGHT_OUTPUT_DIR: e2e-results/write
        run: yarn e2e:dem:test --project=write --no-deps

      - name: Capture dem-dev diagnostics
        if: failure()
        env:
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
        run: yarn e2e:dem:diagnostics

      - name: Stop dem-dev runtime
        if: always()
        env:
          DEM_DEV_ROOT: ${{ github.workspace }}/work/dem-dev
        run: yarn e2e:dem:down || true

      - name: Build Playwright HTML report
        if: always()
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: artifacts/playwright-report
        shell: bash
        run: |
          shopt -s nullglob
          reports=(artifacts/blob-report/*.zip)
          if ((${#reports[@]} == 0)); then
            echo "No Playwright blob reports were produced; skipping HTML report generation."
            exit 0
          fi
          yarn playwright merge-reports --reporter=html artifacts/blob-report

      - name: Upload Playwright report and recordings
        id: playwright-artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dem-dev-playwright-report
          if-no-files-found: warn
          path: |
            artifacts/playwright-report
            e2e-results
          retention-days: 14

      - name: Upload dem-dev diagnostics
        id: dem-dev-artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: dem-dev-runtime-evidence
          if-no-files-found: warn
          path: artifacts/dem-dev
          retention-days: 14

      - name: Summarize E2E run
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          DEM_DEV_REF: ${{ steps.runtime.outputs.dem_dev_ref }}
          SM_API_REF: ${{ steps.runtime.outputs.sm_api_ref }}
          SM_AGENT_REF: ${{ steps.runtime.outputs.sm_agent_ref }}
          PLAYWRIGHT_ARTIFACT_URL: ${{ steps.playwright-artifact.outputs.artifact-url }}
          DEM_DEV_ARTIFACT_URL: ${{ steps.dem-dev-artifact.outputs.artifact-url }}
        run: |
          {
            echo "## dem-dev E2E"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Result | ${JOB_STATUS} |"
            echo "| dem-dev | \`${DEM_DEV_REF}\` |"
            echo "| SM API | \`${SM_API_REF}\` |"
            echo "| SM agent | \`${SM_AGENT_REF}\` |"
            echo
            echo "Videos and screenshots are recorded for every Playwright journey; traces are retained on failure."
            [[ -n "${PLAYWRIGHT_ARTIFACT_URL}" ]] && echo "- [Open Playwright report and recordings](${PLAYWRIGHT_ARTIFACT_URL})"
            [[ -n "${DEM_DEV_ARTIFACT_URL}" ]] && echo "- [Download dem-dev runtime evidence](${DEM_DEV_ARTIFACT_URL})"
          } >> "${GITHUB_STEP_SUMMARY}"
