name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: none

jobs:
  release-please:
    runs-on: ubuntu-arm64-small

    permissions:
      contents: write      # Needed for release-please-action
      pull-requests: write # Needed for release-please-action
      id-token: write      # Needed for create-github-app-token

    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: sm-release-app

      - name: Release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          target-branch: main
          config-file: .github/release-please/release-please-config.json
          manifest-file: .github/release-please/release-please-manifest.json
