name: Terraform Configuration Validation

on:
  pull_request:

permissions: {}

jobs:
  validate-terraform-generation:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Plugin Environment
        uses: ./.github/actions/setup-env

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@712b43959e9be7e82c34d18450fa5ec3237af3f1
        with:
          terraform_version: "~1.0"

      - name: Generate test Terraform configs
        run: |
          echo "🔧 Generating terraform test configurations..."
          yarn build:generate-terraform-test-config
          echo "✅ Test configuration generation completed"

      - name: Validate generated Terraform (JSON and HCL)
        id: terraform-validate
        run: |
          echo '# Terraform provider validation' | tee -a "$GITHUB_STEP_SUMMARY"

          echo "🔍 Validating generated Terraform configuration (JSON and HCL)..."
          echo "📦 Checking Grafana provider version..."

          # Extract provider version constraint from generated config
          if [ -f "artifacts/terraform-validation/testTerraformConfig.tf.json" ]; then
            PROVIDER_CONSTRAINT=$(cat artifacts/terraform-validation/testTerraformConfig.tf.json | grep -A 10 '"required_providers"' | grep -A 5 '"grafana"' | grep '"version"' | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/' | head -1)
            if [ ! -z "$PROVIDER_CONSTRAINT" ]; then
              echo "📋 Provider version constraint: $PROVIDER_CONSTRAINT" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # Get the actual resolved provider version from terraform
          pushd artifacts/terraform-validation
          if terraform version > /tmp/tf_version.txt 2>&1; then
            # Extract grafana provider version from terraform version output
            RESOLVED_VERSION=$(cat /tmp/tf_version.txt | grep -i "provider.*grafana" | sed 's/.*v\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\).*/\1/' | head -1)
            if [ ! -z "$RESOLVED_VERSION" ]; then
              echo "🎯 Resolved Grafana provider version: v$RESOLVED_VERSION" | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️  Could not determine resolved provider version" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          fi
          popd

          if yarn verify:terraform-test-config 2>&1 | tee /tmp/terraform_output.txt ; then
            echo "✅ Terraform configuration validation succeeded!" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            cat <<-'EOT' | tee -a "$GITHUB_STEP_SUMMARY"
          	❌ Terraform configuration validation failed!

          	## 🔧 How to Fix

          	1. **Check field naming and requirements** according to the [Grafana Terraform Provider Documentation](https://registry.terraform.io/providers/grafana/grafana/latest/docs)
          	2. **Ensure all required fields are present** for each resource type
          	3. **Verify data types match** the provider schema expectations
          	4. **Update the transformation functions** in `src/components/TerraformConfig/`

          	## 🧪 To test locally

          	```bash
          	yarn build:generate-terraform-test-config
          	yarn verify:terraform-test-config
          	```
          	EOT
          	exit 1
          fi
