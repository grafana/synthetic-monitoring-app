name: DangerJS

on:
  pull_request:

permissions:
  actions: read          # dawidd6/action-download-artifact
  contents: read        # actions/checkout
  issues: read          # Why?
  pull-requests: write  # Used to post a message to the PR with the results.
  statuses: write       # Update the PR status

jobs:
  danger-js:
    name: DangerJS
    runs-on: ubuntu-latest
    # Uncomment the follwoing line and remove the one after it after merging.
    # if: github.event_name == 'pull_request' && github.base_ref == 'main'
    if: false
    permissions:
      pull-requests: write
      attestations: read
      contents: read
      issues: read
      statuses: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Plugin Environment
        uses: ./.github/actions/setup-env

      - name: Make artifacts folder
        run: mkdir -p artifacts

      - name: Generate current bundle size
        run: yarn run stats artifacts/currentBundleSize.json

      - name: Download mainBundleSize
        id: download-bundle
        uses: dawidd6/action-download-artifact@ac66b43f0e6a346234dd65d4d0c8fbb31cb316e5 # v11
        with:
          workflow: publish-main-bundle-size.yml
          workflow_conclusion: success
          if_no_artifact_found: ignore
          name: mainBundleSize
          path: artifacts

      - name: DangerJS
        if: ${{ hashFiles('artifacts/mainBundleSize.json') != '' }}
        run: yarn danger:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
