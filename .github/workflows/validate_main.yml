name: Validate commits to main

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  # Validate that the code in main is sane.
  ci:
    name: CI
    # Documentation: https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v8.0.1
    permissions:
      contents: read # write is only needed if we publish docs to the website.
      id-token: write
    with:
      branch: ${{ github.ref_name }}

      # When pushing to "main", publish and deploy to Grafana Cloud dev (CD).
      environment: dev

      # Scope: universal for both on-prem and cloud
      scopes: universal

      # Add git SHA to plugin version as suffix for CD builds
      plugin-version-suffix: ${{ github.sha }}

      # Other CI inputs, see https://github.com/grafana/plugin-ci-workflows/blob/main/.github/workflows/ci.yml

      # Node.js version to use
      node-version: 22

      # Disabled - no Playwright tests configured
      run-playwright: false

  # Deploy to dev.
  cd:
    name: CD
    # Documentation: https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions
    uses: grafana/plugin-ci-workflows/.github/workflows/cd.yml@ci-cd-workflows/v8.0.1
    permissions:
      contents: read # write is only needed if we publish docs to the website.
      id-token: write
      attestations: write
    with:
      branch: main

      environment: dev

      docs-only: false

      scopes: universal

      # Argo CD inputs
      grafana-cloud-deployment-type: provisioned
      trigger-argo: true
      argo-workflow-slack-channel: '#sm-ops-deploys'

      auto-merge-environments: dev

      # https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions/#customizing-the-workflows-with-inputs
      node-version: 22
      run-playwright: false  # Disabled - no Playwright tests configured
